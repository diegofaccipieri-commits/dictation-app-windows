<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DictationApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="download-overlay" class="hidden">
            <div class="download-content">
                <h3>Baixando modelos...</h3>
                <div id="download-tiny" class="download-item">
                    <span>Tiny</span>
                    <div class="progress-bar"><div class="progress-fill" id="progress-tiny"></div></div>
                    <span class="progress-text" id="progress-tiny-text">0%</span>
                </div>
                <div id="download-small" class="download-item">
                    <span>Small</span>
                    <div class="progress-bar"><div class="progress-fill" id="progress-small"></div></div>
                    <span class="progress-text" id="progress-small-text">0%</span>
                </div>
                <div id="download-turbo" class="download-item">
                    <span>Turbo</span>
                    <div class="progress-bar"><div class="progress-fill" id="progress-turbo"></div></div>
                    <span class="progress-text" id="progress-turbo-text">0%</span>
                </div>
            </div>
        </div>

        <div id="status-bar">
            <div id="status-indicator">
                <span id="status-icon">●</span>
                <span id="status-spinner" class="hidden"></span>
                <span id="status-check" class="hidden">✓</span>
            </div>
            <span id="status-text">Ready</span>
            <span id="status-timer" class="hidden">0:00</span>
        </div>

        <textarea id="transcription" readonly placeholder="Ctrl Ctrl para ditar..."></textarea>

        <div id="error-message" class="hidden"></div>

        <div id="model-selectors">
            <div class="model-row">
                <label>Ditado:</label>
                <div class="toggle-group" id="live-model-toggle">
                    <button class="toggle-btn" data-model="tiny">Tiny</button>
                    <button class="toggle-btn active" data-model="small">Small</button>
                    <button class="toggle-btn" data-model="turbo">Turbo</button>
                </div>
            </div>
            <div class="model-row">
                <label>Documentos:</label>
                <div class="toggle-group" id="batch-model-toggle">
                    <button class="toggle-btn" data-model="tiny">Tiny</button>
                    <button class="toggle-btn" data-model="small">Small</button>
                    <button class="toggle-btn active" data-model="turbo">Turbo</button>
                </div>
            </div>
            <div class="model-row">
                <label>Ativação:</label>
                <div class="toggle-group" id="activation-key-toggle">
                    <button class="toggle-btn active" data-key="ctrl">Ctrl+Ctrl</button>
                    <button class="toggle-btn" data-key="win">Win+Win</button>
                </div>
            </div>
            <div class="model-row">
                <label>Tradução:</label>
                <select id="translation-mode">
                    <option value="off">Desligada</option>
                    <option value="pt_en">PT -> EN</option>
                    <option value="pt_es">PT -> ES</option>
                    <option value="en_pt">EN -> PT</option>
                    <option value="en_es">EN -> ES</option>
                    <option value="es_pt">ES -> PT</option>
                    <option value="es_en">ES -> EN</option>
                </select>
            </div>
        </div>

        <div id="batch-status" class="hidden">
            <div class="progress-bar"><div class="progress-fill" id="batch-progress"></div></div>
            <span id="batch-status-text"></span>
        </div>

        <div id="history">
            <h4>Recentes</h4>
            <ul id="history-list"></ul>
        </div>

        <div id="footer">
            <span id="version">v1.1.0</span>
            <span id="footer-hotkey">Ctrl Ctrl para ditar</span>
        </div>
    </div>
    <script src="app.js" type="module"></script>
</body>
</html>
